name: PR

on:
    pull_request:
        branches: [main]

jobs:
    release:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version-file: .tool-versions
                  cache: npm

            - run: npm ci

            - run: npm run release
